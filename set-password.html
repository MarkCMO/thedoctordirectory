<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Set Password | The Doctor Directory</title>
<link rel="stylesheet" href="/assets/css/style.css">
<style>
body { background: #f7f5f0; }
.wrap { max-width: 400px; margin: 100px auto; background: #fff; padding: 32px; border-radius: 10px; border: 1px solid #e5e1d6; }
.wrap h1 { font-family: 'Playfair Display', serif; font-size: 24px; margin: 0 0 6px; color: #0b1a2f; }
.wrap p { color: #6b6558; font-size: 14px; margin: 0 0 20px; }
.wrap input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #c8c0ae; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
.wrap button { width: 100%; padding: 14px; background: #C8A45E; border: none; border-radius: 6px; color: #0b1a2f; font-size: 15px; font-weight: 600; cursor: pointer; }
.err { color: #c4432a; font-size: 13px; margin-top: 8px; }
.ok { color: #1b7a2e; font-size: 13px; margin-top: 8px; }
</style></head>
<body>
<div class="wrap">
  <h1>Set Your Password</h1>
  <p id="subtitle">Enter a new password for your account.</p>
  <div id="msg"></div>
  <input type="password" id="pass" placeholder="New password (8+ chars)">
  <input type="password" id="pass2" placeholder="Confirm password">
  <button onclick="setPass()">Save</button>
</div>
<script>
const params = new URLSearchParams(location.search);
const token = params.get('token');
const email = params.get('email');

if (!token || !email) {
  document.getElementById('msg').innerHTML = '<div class="err">Invalid link. Check your email or request a new reset.</div>';
}

async function setPass() {
  const pass = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  const msg = document.getElementById('msg');
  if (pass.length < 8) { msg.innerHTML = '<div class="err">8+ chars required</div>'; return; }
  if (pass !== pass2) { msg.innerHTML = '<div class="err">Passwords don\'t match</div>'; return; }
  msg.innerHTML = 'Working...';
  const r = await fetch('/api/auth-set-password', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token, email, newPassword: pass })
  });
  const data = await r.json();
  if (r.ok) {
    msg.innerHTML = '<div class="ok">Password set! Redirecting...</div>';
    setTimeout(() => location.href = '/admin', 1500);
  } else {
    msg.innerHTML = `<div class="err">${data.error || 'Failed'}</div>`;
  }
}
</script>
</body></html>
